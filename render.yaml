services:
  - type: web
    name: gymlog-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gymlog-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: WORKERS
        value: "1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BACKFILL_ON_STARTUP
        value: "false"
      - key: PYTHONPATH
        value: /opt/render/project/src

databases:
  - name: gymlog-db
    plan: free
